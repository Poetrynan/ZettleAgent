name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'landing-page/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg 2>&1 | tail -3
          ffmpeg -version 2>&1 | head -1

      - name: Compress Hero MP4
        working-directory: landing-page
        run: |
          ffmpeg -y -i knowledge-graph-demo.mp4 \
            -vcodec libx264 -crf 28 -preset slow \
            -profile:v high -level 4.1 \
            -movflags +faststart -an \
            compressed.mp4
          ls -lh knowledge-graph-demo.mp4 compressed.mp4
          rm knowledge-graph-demo.mp4
          mv compressed.mp4 knowledge-graph-demo.mp4
          echo "Done"

      - name: Convert GIFs to WebM
        working-directory: landing-page
        run: |
          for gif in knowledge-graph-interactive.gif showcase-knowledge-graph.gif showcase-graph-view.gif; do
            [ -f "$gif" ] && ffmpeg -y -i "$gif" -c vp9 -b:v 0 -crf 41 -row-mt 1 "${gif%.gif}.webm"
          done

      - name: Convert logo to WebP
        working-directory: landing-page
        run: |
          [ -f new_logo.png ] && ffmpeg -y -i new_logo.png -q:v 80 new_logo.webp || true
          ls -lh new_logo.*

      - name: Upload landing-page artifact (compressed)
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing-page/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
