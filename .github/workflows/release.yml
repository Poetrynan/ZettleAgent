name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            os: macos-arm
          - platform: macos-latest
            target: x86_64-apple-darwin
            os: macos-intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify packaging config
        shell: bash
        run: |
          test -f scripts/download-model.cjs
          test -f scripts/verify-offline-assets.cjs
          grep -q 'build:prod' package.json
          grep -q 'beforeBuildCommand' src-tauri/tauri.conf.json
          grep -q 'build:prod' src-tauri/tauri.conf.json
          test -f src-tauri/resources/ocr_models/det.onnx
          test -f src-tauri/resources/ocr_models/rec.onnx
          ls src-tauri/resources/demo-vault/*.md | head -1

      # Build-time only on CI — fetches embedding models, WASM, fonts, PDF.js.
      # End users never run this step.
      - name: Prepare installer assets
        run: npm run download-model

      - name: Verify offline assets (pre-bundle)
        run: npm run verify-offline

      # Read release notes for body content
      - name: Load release notes
        id: notes
        shell: bash
        run: |
          # Replace version placeholder in notes and escape for YAML multiline
          BODY=$(cat .github/release-notes/latest.md | sed "s/v0\.1\.0/${{ github.ref_name }}/g")
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # beforeBuildCommand = download-model + tsc + vite build
      # Vite copies public/ → dist/ (embedding, WASM, fonts, pdf.js)
      # Tauri bundles dist/ + resources/ocr_models + demo-vault into installer.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ZettelAgent ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
